apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-state-manager
  namespace: terraform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-tf-binding
  namespace: terraform
subjects:
  - kind: User
    name: github-actions-tf
    namespace: terraform
roleRef:
  kind: Role
  name: tf-state-manager
  apiGroup: rbac.authorization.k8s.io
