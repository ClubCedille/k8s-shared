apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
# Allow all pods in the namespace to reach dex on ports 5556/5558 (argocd-server → dex).
# Without this, the Egress NetworkPolicy above blocks SSO login via Authentik.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dex-intranamespace
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5556
        - protocol: TCP
          port: 5558
