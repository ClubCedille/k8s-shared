apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dci-nodered
  namespace: argocd
spec:
  project: k8s-shared
  destination:
    server: https://kubernetes.default.svc
    namespace: dci-nodered
  source:
    repoURL: https://github.com/ClubCedille/k8s-shared
    path: apps/clubs/dci/nodered/prod
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
