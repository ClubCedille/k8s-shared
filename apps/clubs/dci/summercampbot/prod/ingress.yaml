apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dci-summercampbot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/force-ssl-redirect: "true"
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: contour
  tls:
    - secretName: dci-summercampbot
      hosts:
        - summercampbot.dci.etsmtl.club
  rules:
    - host: summercampbot.dci.etsmtl.club
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: summercamp-server
                port:
                  number: 80
