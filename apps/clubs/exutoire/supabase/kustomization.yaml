apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - resources/namespace.yaml
  - resources/configMap.yaml
helmCharts:
  - name: supabase
    version: "0.5.0"
    repo: "https://supabase-community.github.io/supabase-kubernetes"
    releaseName: "supabase"
    namespace: exutoire
    valuesFile: "helm/values.yaml"

patches:
  ## Override STORAGE_BACKEND to s3 and inject AWS credentials for render path
  - target:
      kind: Deployment
      name: supabase-supabase-storage
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STORAGE_BACKEND
          value: "s3"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GLOBAL_S3_ENDPOINT
          value: "http://10.0.21.50:3900"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GLOBAL_S3_PROTOCOL
          value: "http"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GLOBAL_S3_FORCE_PATH_STYLE
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_DEFAULT_REGION
          value: "garage"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: supabase-secret
              key: S3_ACCESS_KEY_ID
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-secret
              key: S3_SECRET_ACCESS_KEY
  ## Inject S3 credentials into imgproxy for direct S3 access
  - target:
      kind: Deployment
      name: supabase-supabase-imgproxy
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: supabase-secret
              key: S3_ACCESS_KEY_ID
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-secret
              key: S3_SECRET_ACCESS_KEY