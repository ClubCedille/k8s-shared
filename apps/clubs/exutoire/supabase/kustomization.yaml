apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - resources/namespace.yaml
  - resources/configMap.yaml
helmCharts:
  - name: supabase
    version: "0.5.0"
    repo: "https://supabase-community.github.io/supabase-kubernetes"
    releaseName: "supabase"
    namespace: exutoire
    valuesFile: "helm/values.yaml"

patches:
  ## Fix imgproxy: replace its own PVC with the storage PVC so it can read files
  ## that the storage API writes. Both pods must be on the same node (RWO constraint).
  - target:
      kind: Deployment
      name: supabase-supabase-imgproxy
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0/persistentVolumeClaim/claimName
        value: supabase-storage
  ## Ensure imgproxy and storage land on the same node (required for RWO PVC sharing)
  - target:
      kind: Deployment
      name: supabase-supabase-imgproxy
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: supabase-storage
                topologyKey: kubernetes.io/hostname