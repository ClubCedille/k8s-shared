apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outline-sync
  template:
    metadata:
      labels:
        app: outline-sync
    spec:
      containers:
        - name: oa-connector
          imagePullPolicy: Always
          image: ghcr.io/burritosoftware/outline-authentik-connector:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: outline-sync-secrets
            - configMapRef:
                name: outline-sync-config
---
apiVersion: v1
kind: Service
metadata:
  name: outline-sync-svc
spec:
  selector:
    app: outline-sync
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: outline-sync-tls
spec:
  secretName: outline-sync-tls
  issuerRef:
    name: letsencrypt-etsmtl
    kind: ClusterIssuer
  commonName: sync-wiki.jdgets.etsmtl.club
  dnsNames:
    - sync-wiki.jdgets.etsmtl.club
---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: outline-sync-proxy
spec:
  virtualhost:
    fqdn: sync-wiki.jdgets.etsmtl.club
    tls:
      secretName: outline-sync-tls
      minimumProtocolVersion: "1.3"
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: outline-sync-svc
          port: 80
      timeoutPolicy:
        idle: 600s
        response: 600s
