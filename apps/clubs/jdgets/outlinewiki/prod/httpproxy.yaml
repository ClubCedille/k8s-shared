apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: jdgets-outlinewiki
spec:
  virtualhost:
    fqdn: wiki.jdgets.etsmtl.club
    tls:
      secretName: outline-cedille-tls
      minimumProtocolVersion: "1.3"
  routes:
    - conditions:
        - prefix: /
      enableWebsockets: true
      services:
        - name: jdgets-outlinewiki-svc
          port: 3000
      timeoutPolicy:
        idle: 600s
        response: 600s
