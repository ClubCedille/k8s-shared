apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: ghcr-clubcedille-secret
spec:
  refreshPeriod: 1h
  vaultSecretDefinitions:
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: docker
      path: kv-system/default_passwords/docker
  output:
    name: ghcr-clubcedille-secret
    stringData:
      .dockerconfigjson: '{{ b64dec .docker.config }}'
    type: kubernetes.io/dockerconfigjson
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: helm-config-secret
spec:
  refreshPeriod: 1h
  vaultSecretDefinitions:
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: helm
      path: kv/data/byzantium-helm/default/config
  output:
    name: helm-config
    stringData:
      secret-key: '{{ .helm.secretkey }}'
    type: opaque
