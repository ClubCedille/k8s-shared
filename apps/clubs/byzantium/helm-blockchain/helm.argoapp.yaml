apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: byzantium-helm
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: webapp=ghcr.io/clubcedille/byzantium-helm:latest
    argocd-image-updater.argoproj.io/webapp.update-strategy: digest
    argocd-image-updater.argoproj.io/webapp.pull-secret: pullsecret:argocd/ghcr-clubcedille-secret
spec:
  project: k8s-shared
  destination:
    server: https://cedille.kubernetes.omni.siderolabs.io?cluster=k8s-shared
    namespace: byzantium-helm
  source:
    repoURL: https://github.com/ClubCedille/k8s-shared
    path: apps/clubs/byzantium/helm-blockchain/prod
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
