apiVersion: apps/v1
kind: Deployment
metadata:
  name: campusparent-backend
  annotations:
    kube-score/ignore: pod-networkpolicy,container-image-tag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campusparent-backend
  template:
    metadata:
      labels:
        app: campusparent-backend
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 10001:10001 /app/uploads"]
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      imagePullSecrets:
        - name: ghcr-clubcedille-secret
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: campusparent-pvc
      containers:
        - name: campusparent
          image: ghcr.io/clubcedille/backend-campusparentv2:latest
          imagePullPolicy: Always
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          ports:
            - containerPort: 80
          env:
            - name: FRONTEND_URL
              value: https://campusparent.etsmtl.club
            - name: BACKEND_URL
              value: https://campusparent.etsmtl.club/api
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: campusparent-backend
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campusparent-backend
                  key: jwt
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: campusparent-backend
                  key: google-clientid
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campusparent-backend
                  key: google-clientsecret
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 700Mi
              ephemeral-storage: 1Gi
          securityContext:
            fsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
