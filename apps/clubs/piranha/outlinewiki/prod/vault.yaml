apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: piranha-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    audiences:
    - vault
    role: secret-reader
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: outline-secrets
spec:
  vaultAuthRef: piranha-auth
  type: kv-v1
  mount: kv
  path: data/piranha-outlinewiki/default/outline-secrets
  destination:
    name: outline-secrets
    create: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: outline-postgresql
spec:
  vaultAuthRef: piranha-auth
  type: kv-v1
  mount: kv
  path: data/piranha-outlinewiki/default/outline-postgresql
  destination:
    name: outline-postgresql
    create: true
    type: kubernetes.io/basic-auth
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: b2-creds
spec:
  vaultAuthRef: piranha-auth
  type: kv-v1
  mount: kv-system
  path: default_passwords/b2-creds
  destination:
    name: b2-creds
    create: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: dockerhub-secret
spec:
  vaultAuthRef: piranha-auth
  type: kv-v1
  mount: kv-system
  path: default_passwords/docker
  destination:
    name: dockerhub-secret
    create: true
    type: kubernetes.io/dockerconfigjson
