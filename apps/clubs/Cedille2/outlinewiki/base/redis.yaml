apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: Cedille2-redis
  annotations:
    kube-score/ignore: pod-networkpolicy, pod-probes-identical, container-security-context-user-group-id, container-security-context-readonlyrootfilesystem
spec:
  serviceName: Cedille2-redis-svc
  replicas: 1
  selector:
    matchLabels:
      app: Cedille2-redis
  template:
    metadata:
      labels:
        app: Cedille2-redis
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          imagePullPolicy: Always
          command: ["sh", "-c", "chown -R 10001:10001 /data"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: Cedille2-redis-pv-claim
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"
      securityContext:
        fsGroup: 10001
      containers:
        - name: redis
          image: redis:8.6.2
          imagePullPolicy: Always
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: Cedille2-redis-pv-claim
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 500Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 1Gi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      imagePullSecrets:
        - name: dockerhub-secret
  volumeClaimTemplates:
    - metadata:
        name: Cedille2-redis-pv-claim
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        storageClassName: cephfs
---
apiVersion: v1
kind: Service
metadata:
  name: Cedille2-redis-svc
spec:
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
  selector:
    app: Cedille2-redis
