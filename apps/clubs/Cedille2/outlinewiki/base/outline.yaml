apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: Cedille2-outlinewiki-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: Cedille2-outlinewiki
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: Cedille2-outlinewiki
  annotations:
    kube-score/ignore: pod-networkpolicy, container-security-context-readonlyrootfilesystem, container-security-context-privileged, container-security-context-user-group-id, container-image-tag
spec:
  serviceName: Cedille2-outlinewiki-svc
  replicas: 1
  selector:
    matchLabels:
      app: Cedille2-outlinewiki
  template:
    metadata:
      labels:
        app: Cedille2-outlinewiki
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          imagePullPolicy: Always
          command: ["sh", "-c", "chown -R 10001:10001 /var/lib/outline/data"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: Cedille2-outlinewiki-pv-claim
              mountPath: /var/lib/outline/data
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"
      containers:
        - image: outlinewiki/outline:1.7.0
          name: outline
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: outline-secrets
            - configMapRef:
                name: outline-config
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/outline/data
              name: Cedille2-outlinewiki-pv-claim
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 250m
              memory: 500Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 1Gi
          readinessProbe:
            httpGet:
              path: /_health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      imagePullSecrets:
        - name: dockerhub-secret
      restartPolicy: Always
  volumeClaimTemplates:
    - metadata:
        name: Cedille2-outlinewiki-pv-claim
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 15Gi
        storageClassName: cephfs
---
apiVersion: v1
kind: Service
metadata:
  name: Cedille2-outlinewiki-svc
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  clusterIP: None
  selector:
    app: Cedille2-outlinewiki
