apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: Cedille2-outlinewiki
  namespace: argocd
spec:
  destination:
    namespace: Cedille2-outlinewiki
    server: https://kubernetes.default.svc
  project: k8s-shared
  source:
    path: apps/clubs/Cedille2/outlinewiki/prod
    repoURL: https://github.com/ClubCedille/k8s-shared
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
