apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capra-outlinewiki
  namespace: argocd
spec:
  destination:
    namespace: capra-outlinewiki
    server: https://kubernetes.default.svc
  project: k8s-shared
  source:
    path: apps/clubs/capra/outlinewiki/prod
    repoURL: https://github.com/ClubCedille/k8s-shared
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
