apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-sonarqube-cluster
  namespace: sonarqube
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  instances: 1
  bootstrap:
    initdb:
      database: sonarqube
      owner: sonarqube
      secret:
        name: postgres-secret-sonarqube
  storage:
    size: 40Gi
    storageClass: cephfs
