apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: dockerhub-pull-secret
spec:
  refreshPeriod: 1h
  vaultSecretDefinitions:
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: docker
      path: kv-system/default_passwords/dockerhub
  output:
    name: dockerhub-pull
    stringData:
      .dockerconfigjson: '{{ b64dec .docker.config }}'
    type: kubernetes.io/dockerconfigjson
---
