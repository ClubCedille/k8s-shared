---
imagePullSecrets:
  - name: dockerhub-pull
collabora:
  replicaCount: 1
  autoscaling:
    enabled: false
  aliasgroups:
    - host: https://nextcloud.etsmtl.club:443
  extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:num_prespawn_children=4
    --o:remote_font_config.url=https://nextcloud.etsmtl.club/apps/richdocuments/settings/fonts.json
    --o:allow_update_popup=false
  server_name: collabora-nextcloud.etsmtl.club
  existingSecret:
    enabled: true
    secretName: collabora-admin
    usernameKey: username
    passwordKey: password
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 2000
  resources:
    requests:
      cpu: 6000m
      memory: 12Gi
      ephemeral-storage: "4Gi"
    limits:
      cpu: 8000m
      memory: 16Gi
      ephemeral-storage: "5Gi"
  livenessProbe:
    httpGet:
      path: /
      port: 9980
    initialDelaySeconds: 30
    periodSeconds: 10
  image:
    repository: collabora/code
    tag: "24.04.13.3.1"
    pullPolicy: IfNotPresent
  securityContext:
    privileged: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
