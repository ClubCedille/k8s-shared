apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: netbox-httpproxy
spec:
  virtualhost:
    fqdn: netbox.etsmtl.club
    tls:
      secretName: netbox-tls
      minimumProtocolVersion: "1.3"
  routes:
    - conditions:
        - prefix: /
      services:
        - name: netbox-v1
          port: 80
