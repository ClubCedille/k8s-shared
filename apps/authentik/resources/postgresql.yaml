apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-authentik
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16.9
  instances: 2
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-cnpg-app
  storage:
    size: 10Gi
    storageClass: ceph-rbd
  walStorage:
    size: 2Gi
    storageClass: ceph-rbd
  postgresql:
    parameters:
      max_connections: "200"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-authentik-b2
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-backup-schedule-authentik
spec:
  schedule: "0 40 6 * * *"
  backupOwnerReference: self
  cluster:
    name: postgresql-authentik
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cnpg-authentik-b2
spec:
  configuration:
    destinationPath: s3://k8s-shared-bucket/postgresql-authentik
    endpointURL: https://s3.ca-east-006.backblazeb2.com
    s3Credentials:
      accessKeyId:
        name: b2-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: b2-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      encryption: AES256
    data:
      compression: gzip
      encryption: AES256
      jobs: 2
  retentionPolicy: 30d
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
