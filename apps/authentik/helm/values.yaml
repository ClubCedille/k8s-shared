authentik:
  error_reporting:
    enabled: false

server:
  ingress:
    enabled: false
    hosts:
      - auth.etsmtl.club

defaultStorageClass: cephfs

global:
  storageClass: cephfs
  security:
    allowInsecureImages: true
  volumes:
    - name: authentik-branding
      persistentVolumeClaim:
        claimName: authentik-branding-pvc
  volumeMounts:
    - name: authentik-branding
      mountPath: /data/test
  initContainers:
    - name: init-permissions
      image: busybox
      command:
        - /bin/sh
        - -c
        - |
          chown -R <1000>:<1000> /data/media/
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  env:
    - name: AUTHENTIK_STORAGE__BACKEND
      value: "file"
    - name: AUTHENTIK_STORAGE__FILE__PATH
      value: "/data/test"
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_SECRET_KEY

    - name: AUTHENTIK_BOOTSTRAP_TOKEN
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_BOOTSTRAP_TOKEN
    - name: AUTHENTIK_BOOTSTRAP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_BOOTSTRAP_PASSWORD

    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: AUTHENTIK_POSTGRES_PASSWORD

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: library/postgres
    tag: "15-bookworm"
  auth:
    existingSecret: authentik-secrets
    secretKeys:
      adminPasswordKey: AUTHENTIK_POSTGRES_PASSWORD
      userPasswordKey: AUTHENTIK_POSTGRES_PASSWORD
  persistence:
    enabled: true
    storageClass: cephfs
