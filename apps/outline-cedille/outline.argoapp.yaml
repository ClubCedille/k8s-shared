apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: outline-cedille-shared
  namespace: argocd
spec:
  destination:
    namespace: outline-cedille
    server: https://kubernetes.default.svc
  project: k8s-shared
  source:
    path: apps/outline-cedille/prod
    repoURL: https://github.com/ClubCedille/k8s-shared.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
