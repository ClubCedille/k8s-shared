apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: ctfd-httpproxy
spec:
  virtualhost:
    fqdn: ctfd.etsmtl.club
    tls:
      secretName: ctfd-tls
      minimumProtocolVersion: "1.3"
  routes:
    - conditions:
        - prefix: /
      services:
        - name: ctfd
          port: 80
      enableWebsockets: true
