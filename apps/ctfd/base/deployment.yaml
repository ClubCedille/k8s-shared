apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctfd
  annotations:
    kube-score/ignore: pod-networkpolicy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ctfd
  template:
    metadata:
      labels:
        app: ctfd
      annotations:
        backup.velero.io/backup-volumes: ctfd-storage

    spec:
      containers:
        - name: ctfd
          image: ctfd/ctfd:3.8.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          env:
            - name: UPLOAD_FOLDER
              value: "/var/uploads"
            - name: LOG_FOLDER
              value: "/var/log/CTFd"
            - name: WORKERS
              value: "4"
            - name: REDIS_URL
              value: "redis://redis.ctfd.svc.cluster.local:6379"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ctfd-secret
                  key: SECRET_KEY
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: MYSQL_PASSWORD
                  name: ctfd-secret
            - name: DATABASE_URL
              value: mysql+pymysql://ctfd_user:$(DATABASE_PASSWORD)@mysql.ctfd.svc.cluster.local/ctfd

          volumeMounts:
            - name: uploads
              mountPath: /var/uploads
            - name: logs
              mountPath: /var/log/CTFd

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 5

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
              ephemeral-storage: 1Gi

          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            runAsNonRoot: true
            allowPrivilegeEscalation: false

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ctfd-uploads-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: ctfd-logs-pvc
