apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: littlelink
  namespace: littlelink
spec:
  virtualhost:
    fqdn: littlelink.etsmtl.club
    tls:
      secretName: littlelink-tls
      minimumProtocolVersion: "1.3"
  routes:
    - conditions:
        - prefix: /
      services:
        - name: littlelink
          port: 80